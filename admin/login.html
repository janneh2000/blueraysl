<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Blue-Ray</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" type="image/png" href="../images/logo-small.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body" data-page="login">

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <img src="../images/logo-small.png" alt="Blue-Ray">
        <div class="login-brand-text">Blue-Ray<span>Admin Portal</span></div>
      </div>
      <h1>Sign in</h1>
      <p class="lead">Access the admin dashboard for blueraysl.com</p>

      <div class="login-error" id="login-error"></div>

      <form id="login-form">
        <div class="adm-form-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required autocomplete="username" placeholder="you@blueraysl.com">
        </div>
        <div class="adm-form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required autocomplete="current-password" placeholder="Your password">
        </div>
        <button type="submit" class="btn-primary-sm" style="width:100%; justify-content:center; padding:13px;">
          Sign in
        </button>
      </form>

      <div class="login-divider">or</div>

      <button type="button" class="btn-google" id="btn-google">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span>Continue with Google</span>
      </button>

      <p class="muted center" style="font-size:0.78rem; margin-top:24px;">
        Need an account? Ask the site administrator to create one for you.
      </p>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/admin.js"></script>
  <script>
    const sb = window.adminSb;
    const errBox = document.getElementById('login-error');
    function showErr(msg) {
      errBox.textContent = msg;
      errBox.classList.add('visible');
    }
    function clearErr() { errBox.classList.remove('visible'); }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErr();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true; btn.textContent = 'Signing in…';
      const { error } = await sb.auth.signInWithPassword({ email, password });
      btn.disabled = false; btn.textContent = 'Sign in';
      if (error) {
        showErr(error.message || 'Sign-in failed.');
        return;
      }
      const redirectTo = sessionStorage.getItem('postLoginRedirect') || 'index.html';
      sessionStorage.removeItem('postLoginRedirect');
      location.replace(redirectTo);
    });

    document.getElementById('btn-google').addEventListener('click', async () => {
      clearErr();
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: location.origin + location.pathname.replace('login.html', 'index.html') }
      });
      if (error) showErr(error.message || 'Google sign-in failed.');
    });
  </script>
</body>
</html>
